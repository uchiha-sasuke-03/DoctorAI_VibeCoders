<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D First-Aid Viewer — aidAR</title>
  <meta name="description" content="Interactive 3D anatomy viewer with CPR and bleeding first-aid demonstrations powered by Three.js." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <!-- ========== TOP NAV ========== -->
  <header id="top-nav">
    <div class="nav-inner">
      <a href="/" class="logo" style="text-decoration:none;">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L12 22M2 12L22 12" stroke-linecap="round"/>
            <circle cx="12" cy="12" r="10"/>
          </svg>
        </div>
        <span class="logo-text">aid<span class="logo-ai">AR</span></span>
      </a>
      <nav class="nav-links">
        <a href="/" class="nav-tab">Home</a>
        <a href="/viewer.html" class="nav-tab active">3D Viewer</a>
        <a href="/doctor.html" class="nav-tab">AI Doctor</a>
      </nav>
      <div class="nav-status">
        <span class="status-dot"></span>
        <span>System Active</span>
      </div>
    </div>
  </header>

  <!-- ========== MAIN LAYOUT ========== -->
  <main id="app-main">
    <!-- 3D VIEWER PANEL -->
    <section id="viewer-panel">
      <div id="three-canvas-container"></div>

      <!-- Animation Controls Overlay -->
      <div id="animation-controls">
        <h3 class="controls-title">First-Aid Procedures</h3>
        <div class="controls-grid">
          <button id="btn-cpr" class="anim-btn">
            <div class="anim-btn-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
              </svg>
            </div>
            <span>CPR</span>
            <small>Chest Compressions</small>
          </button>
          <button id="btn-bleeding" class="anim-btn">
            <div class="anim-btn-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
              </svg>
            </div>
            <span>Bleeding</span>
            <small>Pressure & Elevation</small>
          </button>
          <button id="btn-reset" class="anim-btn reset-btn">
            <div class="anim-btn-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M1 4v6h6M23 20v-6h-6"/>
                <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
              </svg>
            </div>
            <span>Reset</span>
            <small>Default Pose</small>
          </button>
        </div>
      </div>

      <!-- Viewer Info Overlay -->
      <div id="viewer-info">
        <span id="viewer-mode-label">Interactive Mode</span>
        <span id="viewer-hint">Drag to rotate • Scroll to zoom</span>
      </div>
    </section>

    <!-- SIDE PANEL -->
    <aside id="side-panel">
      <!-- Panel Header -->
      <div id="panel-tabs">
        <button class="panel-tab active" data-panel="narrator">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          AR Narrator
        </button>
      </div>

      <!-- AR Narrator Chat -->
      <div id="narrator-panel" class="chat-panel active">
        <div id="narrator-messages" class="chat-messages"></div>
        <div class="narrator-status">
          <span class="status-dot pulse"></span>
          <span>Watching 3D Viewer…</span>
        </div>
      </div>
    </aside>
  </main>

  <!-- MOBILE PANEL TOGGLE -->
  <button id="mobile-panel-toggle" aria-label="Toggle side panel">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
  </button>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
